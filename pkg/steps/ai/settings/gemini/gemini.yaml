slug: gemini-chat
name: Gemini chat API flags
description: Settings for the Gemini chat API
flags:
  - name: gemini-base-url
    type: string
    help: base URL
    default: "https://generativelanguage.googleapis.com/"
  - name: gemini-api-key
    type: string
    help: API key
    default: ""
  - name: gemini-api-version
    type: string
    help: Gemini API version used by google.golang.org/genai HTTP options
    default: "v1beta"
  - name: gemini-include-thoughts
    type: bool
    help: include Gemini thought parts in responses when supported by the model
  - name: gemini-thinking-budget
    type: int
    help: Gemini thinking budget in tokens when supported by the model
  - name: gemini-thinking-level
    type: string
    help: Gemini thinking level (MINIMAL, LOW, MEDIUM, HIGH) when supported by the model
    default: ""
