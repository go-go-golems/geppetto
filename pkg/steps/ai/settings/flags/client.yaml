slug: ai-client
name: AI client flags
flags:
  - name: timeout
    type: int
    help: timeout (in seconds)
    default: 60
  - name: organization
    type: string
    help: organization
    default: ""
  - name: user-agent
    type: string
    help: user agent
  - name: proxy-url
    type: string
    help: explicit proxy URL for outbound AI HTTP requests
  - name: proxy-from-environment
    type: bool
    help: use HTTP_PROXY, HTTPS_PROXY, and NO_PROXY when no explicit proxy URL is set
    default: true
