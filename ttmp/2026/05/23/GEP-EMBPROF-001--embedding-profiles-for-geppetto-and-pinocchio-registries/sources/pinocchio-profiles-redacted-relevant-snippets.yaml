slug: default
profiles:
  openai-responses-base:
    display_name: OpenAI Responses base
    description: Shared OpenAI API key and OpenAI Responses API type.
    inference_settings:
      chat:
        api_type: openai-responses
      api:
        api_keys:
          openai-api-key: <redacted>
  ollama-openai-base:
    display_name: Ollama OpenAI-compatible base
    description: Shared local Ollama OpenAI-compatible base URL.
    inference_settings:
      chat:
        api_type: openai
      api:
        base_urls:
          openai-base-url: http://localhost:11434/v1
  gpt-5-low:
    stack:
    - profile_slug: openai-responses-base
    display_name: GPT-5 Low Effort
    description: OpenAI Responses GPT-5 profile with low reasoning effort and concise
      summaries.
    inference_settings:
      chat:
        engine: gpt-5
      inference:
        reasoning_effort: low
        reasoning_summary: concise
  gpt-5-nano-low:
    stack:
    - profile_slug: openai-responses-base
    display_name: GPT-5 Nano Low Effort
    description: OpenAI Responses nano profile with low reasoning effort and concise
      summaries.
    inference_settings:
      chat:
        engine: gpt-5-nano
        max_response_tokens: 128000
      inference:
        reasoning_effort: low
        reasoning_summary: concise
  openai-embedding-small:
    stack:
    - profile_slug: openai-responses-base
    display_name: OpenAI text-embedding-3-small
    description: Embedding profile for semantic search and vector indexing using OpenAI
      text-embedding-3-small.
    inference_settings:
      embeddings:
        type: openai
        engine: text-embedding-3-small
        dimensions: 1536
        cache_type: file
        cache_directory: ./.geppetto/embeddings-cache/openai-text-embedding-3-small
  openai-embedding-large:
    stack:
    - profile_slug: openai-responses-base
    display_name: OpenAI text-embedding-3-large
    description: Higher-dimensional OpenAI embedding profile for higher-recall semantic
      search experiments.
    inference_settings:
      embeddings:
        type: openai
        engine: text-embedding-3-large
        dimensions: 3072
        cache_type: file
        cache_directory: ./.geppetto/embeddings-cache/openai-text-embedding-3-large
  ollama-nomic-embedding:
    display_name: Ollama nomic-embed-text embeddings
    description: Local embedding profile for private smoke tests and semantic-search
      development.
    inference_settings:
      api:
        base_urls:
          ollama-base-url: http://localhost:11434
      embeddings:
        type: ollama
        engine: nomic-embed-text
        dimensions: 768
        cache_type: file
        cache_directory: ./.geppetto/embeddings-cache/ollama-nomic-embed-text
  ollama-all-minilm-embedding:
    display_name: Ollama all-minilm embeddings
    description: Fast local embedding profile for smoke tests and low-cost local checks.
    inference_settings:
      api:
        base_urls:
          ollama-base-url: http://localhost:11434
      embeddings:
        type: ollama
        engine: all-minilm
        dimensions: 384
        cache_type: file
        cache_directory: ./.geppetto/embeddings-cache/ollama-all-minilm
