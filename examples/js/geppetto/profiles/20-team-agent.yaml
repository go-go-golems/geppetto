slug: team-agent
display_name: Team profiles
description: Team-level engine presets layered on top of provider defaults.
profiles:
  default:
    slug: default
    stack:
      - registry_slug: provider-openai
        profile_slug: default
    inference_settings:
      chat:
        engine: gpt-4.1-mini
  assistant:
    slug: assistant
    stack:
      - profile_slug: default
    inference_settings:
      chat:
        api_type: openai-responses
        engine: gpt-5-mini
  analyst:
    slug: analyst
    stack:
      - profile_slug: assistant
    inference_settings:
      chat:
        engine: gpt-5
