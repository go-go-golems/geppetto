slug: hardcut
display_name: Hard-Cut Phase 1-3 Examples
profiles:
  assistant:
    display_name: Assistant
    inference_settings:
      api:
        api_keys:
          openai-api-key: example-secret
      chat:
        api_type: openai
        engine: gpt-4o-mini
        temperature: 0.2
        max_response_tokens: 128
      embeddings:
        type: openai
        engine: text-embedding-3-small
        dimensions: 4
      model_info:
        id: gpt-4o-mini
        name: GPT-4o Mini
        context_window: 128000
        max_output_tokens: 16384
        cost:
          input: 0.15
          output: 0.6
  bge-reranker:
    display_name: BGE Reranker (local llama.cpp)
    inference_settings:
      api:
        base_urls:
          rerank-base-url: http://127.0.0.1:18012
        allow_http:
          rerank: true
        allow_local_networks:
          rerank: true
      rerank:
        type: llamacpp
        engine: qllama/bge-reranker-v2-m3:q4_k_m
        max_request_bytes: 2097152
        max_response_bytes: 1048576
